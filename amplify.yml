version: 1
frontend:
  phases:
    preBuild:
      commands:
        - rm -rf node_modules && rm -f package-lock.json
        - npm install
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - node_modules/**/*
backend:
  phases:
    preBuild:
      commands:
        - nvm use 20
    build:
      commands:
        - npm install
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID